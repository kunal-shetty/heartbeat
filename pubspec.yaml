name: chatterbox
description: Real-time chat app built with Flutter and Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Dependency injection
  get_it: ^7.6.7

  # Supabase
  supabase_flutter: ^2.5.0

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # Local cache
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Push notifications
  # firebase_core: ^3.1.0
  # firebase_messaging: ^15.0.2
  # flutter_local_notifications: ^17.1.2

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # Audio
  just_audio: ^0.9.39
  audio_waveforms: ^1.0.5

  # UI / UX
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  timeago: ^3.6.1
  intl: 0.20.2
  emoji_picker_flutter: ^2.2.0

  # Utilities
  connectivity_plus: ^6.0.3
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.3.1
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  mime: ^1.0.5
  record: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4

dependency_overrides:
  record_linux: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/